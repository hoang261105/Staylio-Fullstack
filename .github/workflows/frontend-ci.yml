name: Frontend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - "staylio_frontend/**"
      - ".github/workflows/frontend-ci.yml"

  pull_request:
    branches: [ "main" ]
    paths:
      - "staylio_frontend/**"

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: staylio_frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: staylio_frontend/package-lock.json

      - run: npm ci
      - run: npm run build