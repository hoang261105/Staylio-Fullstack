server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: staylio_backend
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jooq:
    sql-dialect: org.hibernate.dialect.MySQLDialect
  jpa:
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  app:
    server-url: http://localhost:8080

  data:
    redis:
      host: ${UPSTASH_REDIS_HOST}
      port: 6379
      username: default
      password: ${UPSTASH_REDIS_PASSWORD}
      ssl:
        enabled: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/api/v1/auth/google-login/oauth2/code/google"
            scope:
              - email
              - profile
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.1-8b-instant

zalopay:
  app-id: ${ZALOPAY_APP_ID}
  key1: ${ZALOPAY_KEY1}
  key2: ${ZALOPAY_KEY2}
  create-order-url: https://sb-openapi.zalopay.vn/v2/create
  callback-url: https://thinning-primate-renegade.ngrok-free.dev/api/v1/payments/zalopay/callback
  redirect-url: http://localhost:3002/booking-history

cloudinary:
  cloud_name: dtc7mun2h
  api_key: ${CLOUDINARY_API_KEY}
  api_secret: ${CLOUDINARY_API_SECRET}

jwt:
  secret:
    key: ${JWT_SECRET}
  expired:
    token: 3600000
    access: 1800000    
    refresh: 608000000

openai:
  api-key: ${OPENAI_API_KEY:}

traveloka:
  api:
    url: "https://api.travelokapartnersnetwork.com/v1"
    key: ${TRAVELOKA_API_KEY:}

paypal:
  client-id: ${PAYPAL_CLIENT_ID}
  client-secret: ${PAYPAL_CLIENT_SECRET}
  mode: ${PAYPAL_MODE:sandbox}
  base-url: https://api-m.sandbox.paypal.com
  return-url: ${APP_SERVER_URL:http://localhost:8080}/api/v1/payments/paypal/capture
  cancel-url: ${APP_SERVER_URL:http://localhost:8080}/api/v1/payments/paypal/cancel

vnpay:
  tmn-code: ${VNPAY_TMN_CODE}
  hash-secret: ${VNPAY_HASH_SECRET}
  pay-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
  return-url: ${APP_SERVER_URL:http://localhost:8080}/api/v1/payments/vnpay/callback
  api-url: https://sandbox.vnpayment.vn/merchant_webapi/api/transaction
  version: "2.1.0"
  command: "pay"