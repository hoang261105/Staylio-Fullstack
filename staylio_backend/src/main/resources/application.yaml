server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: staylio_backend
  datasource:
    url: jdbc:mysql://localhost:3306/staylio_db?createDatabaseIfNotExist=true
    username: root
    password: 123456
  jooq:
    sql-dialect: org.hibernate.dialect.MySQL8Dialect
  jpa:
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  app:
    server-url: http://localhost:8080
  data:
    redis:
      host: ${UPSTASH_REDIS_HOST}
      port: 6379
      username: default
      password: ${UPSTASH_REDIS_PASSWORD}
      ssl:
        enabled: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/api/v1/auth/google-login/oauth2/code/google"
            scope:
              - email
              - profile

cloudinary:
  cloud_name: dtc7mun2h
  api_key: ${CLOUDINARY_API_KEY}
  api_secret: ${CLOUDINARY_API_SECRET}

jwt:
  secret:
    key: ${JWT_SECRET}
  expired:
    token: 3600000
    access: 1800000        # 1 giờ = 60 * 60 * 1000
    refresh: 608000000